<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Advice generator app</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@100..900&family=Figtree:wght@757&family=Inter:wght@100..900&family=Josefin+Sans:wght@500&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Lexend+Deca:wght@100..900&family=Libre+Franklin:ital,wght@0,100;1,100&family=Manrope:wght@800&family=Merienda:wght@716&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap');
    *{
      margin: 0;
      padding: 0;
    }

    .container{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: hsl(218, 23%, 16%) ;
      gap: 20px;
      
    }
    .cards{
display: flex;
justify-content: center;
align-items: center;
flex-direction: column;
padding:40px;
width: 400px;
height: 250px;
gap: 20px;
background-color:hsl(217, 19%, 24%) ;
border-radius: 10px;
justify-content: space-between;
text-align: center;
    }
    h4{
      color:hsl(150, 100%, 66%) ;
      letter-spacing: 5px;
      font-size: 13px;
      text-transform: uppercase;
    }
    button{
background-color: hsl(150, 100%, 66%) ;
border: 1px solid hsl(150, 100%, 66%);
border-radius: 100px;
width: 60px;
height: 60px;
padding: 13px ;  
margin: 20px 30px;
display: flex;
justify-content: center;
align-items: center;
}
 button:hover{
background-color: 150,hsl(150, 100%, 66%);
    }
    h1{
   color:  hsl(193, 38%, 86%);
   font-size: 25px;
   font-family: "Manrope", sans-serif;
   padding: 20px;
 font-weight: 300;
 cursor: pointer;
 
    }
  </style>
</head>
<body>
<div class="container">
  <div class="cards">
  <h4> ADVICE     #117</h4>
  <h1>"It is easy to sit up and take notice, what's difficult is getting up and taking action"</h1>

<img src="/images/pattern-divider-desktop.svg" alt="">
<button class="img"><img src="/images/icon-dice.svg" width="80%" alt=""></button>
</div>
</div>





  
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div>
</body>
</html>
