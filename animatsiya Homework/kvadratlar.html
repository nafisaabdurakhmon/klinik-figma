<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harakatlanuvchi Kvadratlar</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: white;
    margin: 0;
}

.container {
    position: relative;
    width: 600px;
    height: 600px;
}

.square {
    position: absolute;
    border: 3px solid;
}

.green {
    width: 100%;
    height: 100%;
    border-color: green;
}

.yellow {
    width: 80%;
    height: 80%;
    border-color: orange;
    top: 10%;
    left: 10%;
}

.blue {
    width: 60%;
    height: 60%;
    border-color: blue;
    top: 20%;
    left: 20%;
}

.pink {
    width: 40%;
    height: 40%;
    border-color: pink;
    top: 30%;
    left: 30%;
}

/* Harakatlanuvchi kvadratlar */
.moving-box {
    /* position: absolute; */
    width: 50px;
    height: 50px;
    border: 3px solid black;
    background: white;
    animation-name:moveAround ;
    animation-duration: 4s;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
}

.delay1 { animation-delay: 0.5s; }
.delay2 { animation-delay: 1s; }
.delay3 { animation-delay: 1.5s; }

@keyframes moveAround {
    
     0% {
        transform: translate(0, 0);
    }
    25% {
        transform: translate(300px, 0);
    }
    50% {
        transform: translate(300px, 450px);
    }
    75% {
        transform: translate(0, 450px);
    }
    100% {
        transform: translate(0, 0);
    }
} 

    

/* @keyframes moveAround {
    0% { top: 0; left: 0; }
    25% { top: 0; left: 100%; }
    50% { top: 100%; left: 100%; }
    75% { top: 100%; left: 0; }
    100% { top: 0; left: 0; }
} */

    </style>
</head>
<body>
    <div class="container">
        <div class="square big green"></div>
        <div class="square medium yellow"></div>
        <div class="square small blue"></div>
        <div class="square tiny pink"></div>

        <div class="moving-box"></div>
        <div class="moving-box delay1"></div>
        <div class="moving-box delay2"></div>
        <div class="moving-box delay3"></div>
    </div>
</body>
</html>
