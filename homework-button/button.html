<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Button</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
            .btn {
                background-color: black;
                display: flex;
                justify-content: center;
                align-items: center;
                border: 4px solid white;
                width: 800px;
                height: 500px;
                border-radius: 20px;
            }

            button {
                width: 266px;
                height: 90px;
                border-radius: 20px;
                background-color: white;
                color: black;
                cursor: pointer;
                font-size: 26px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 300ms ease;
            }
            /* button:active {
                transform: scale(1.45);
            } */
            button:hover {
                background-color: green;
                border: 4px solid white;
                color: white;
            }
        </style>
    </head>
    <body>
        <div class="btn"><button>Hover me!</button></div>
    </body>
</html>
