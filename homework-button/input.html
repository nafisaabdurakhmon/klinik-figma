<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                flex-direction: column;
                gap: 3rem;
            }
            /* input */
            form {
                display: flex;
                gap: 1rem;
            }
            input {
                width: 300px;
                height: 40px;
                border: 1px solid #ccc;
                border-radius: 5px;
                padding: 10px;
            }
            button {
                width: 80px;
                height: 40px;
                border: 1px solid #ccc;
                cursor: pointer;
                background-color: #2d74ff;
                color: white;
                border-radius: 5px;
                padding: 10px;
            }
            button:hover {
                background-color: #8895bc;
            }

            input:focus {
                border: 1px solid red;
                outline: none;
            }
            /* input:invalid {
                transform: translateX(10px);
            } */

            /* checkbox */

            .checkbox:checked {
                accent-color: red;
                outline: 1px solid red;
                width: 50px;
                height: 50px;
            }
            .checkbox {
                width: 30px;
                height: 30px;
            }
        </style>
    </head>
    <body>
        <form>
            <input type="text" placeholder="Enter your name" required />
            <button>Submit</button>
        </form>
        <input type="checkbox" class="checkbox" />
    </body>
</html>
