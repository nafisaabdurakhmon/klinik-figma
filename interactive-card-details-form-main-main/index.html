<!DOCTYPE html>
<html lang="en">
<head>

  
  <title>Frontend Mentor | Interactive card details form</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Alata&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Karla:ital,wght@0,200..800;1,200..800&family=Rubik:ital,wght@0,300..900;1,300..900&family=Space+Grotesk:wght@300..700&display=swap');

    * {
      margin: 0;
      padding: 0;
    }
    
    body {
      background-image: url(/images/bg-main-desktop.png);
      font-family: "Space Grotesk", sans-serif;
      font-size: 18px;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color:  hsl(0, 0%, 100%);
      margin-left: 30rem;
    }

    .form-control {
      display: flex;
      flex-direction: column;
      gap: 5px;
      text-transform: uppercase;
      flex: 1;

    }

    input {
      padding: 10px;
      border-radius: 5px;
      border: 1px solid hsl(0, 0%, 90%);
    }
    
    ::placeholder {
      color: hsl(0, 0%, 70%);
    }

    label {
      font-size: 12px;

    }

    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .security {
      display: flex;
      gap: 10px;
    }

    .date {
      display: flex;
      gap: 10px;
    }

    .date input {
      width: 50px;
    }

    button {
      padding: 15px 10px;
      background-color: hsl(278, 68%, 11%);
      border: none;
      border-radius: 5px;
      cursor: pointer;
      color: hsl(0, 0%, 100%);
     margin-top: 15px; 
     letter-spacing: 1px;
     
    }
   .card-front {
    width:447px ;
    height:245px ;
    background-image: url(/images/bg-card-front.png);
background-size: cover;
background-position: center;
      /* position: absolute;
      top: 200px;
      left: 100px;
      z-index: 100; */
      align-self: flex-start;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      
   }
   .card-front img{
width: 100px;
margin: 20px;
   }
   .card-number{
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin: 20px;
    color: white;
   }
   .card-number h1{
font-size: 30px;
letter-spacing: 2px;
font-weight: 200;
  }
   .card-name{
    display: flex;
    justify-content: space-between;
    
   }
   .card-name h3{
    font-size: 15px;
    font-weight: 200;
   }
   .card-back {
    width:447px ;
    height:245px ;
    background-image: url(/images/bg-card-back.png);
background-size: contain;
background-position: center;
 /* position: absolute;
 top: 500px;
 left: 160px;
 z-index: 100; */
 align-self: flex-end;
   }
   .cards{
    display: flex;
    flex-direction: column;
    width: 40%;
    justify-content: center;
    align-items: center;
    position: absolute;
    top: 0;
    bottom: 0;
    left: 100px;
    gap: 2rem;
   }
  </style>
</head>

<body>

<div class="container">
  <div class="cards">
  <div class="card-front">
  <img src="/images/card-logo.svg" alt="">
  <div class="card-number">
<h1>  0000 0000 0000 0000</h1>
<div class="card-name">
  <h3>Jane Appleseed</h3>
  <h3>00/00</h3>
</div>
  </div>
  </div>
  <div class="card-back">
    
  </div>
</div>
  <form action="">
    <div class="form-control">
      <div>
        <img src="/images/" alt="">
      </div>
    <label for="">Cardholder Name</label>
    <input type="text" placeholder=" e.g. Jane Appleseed">
  </div>
  <div class="form-control">
    <label for="">Card Number</label>
    <input type="text" placeholder="  e.g. 1234 5678 9123 0000">
  </div>
  <div class="security">
    <div class="form-control">
    <label for=""> Exp. Date (MM/YY)</label>
    <div class="date">
      <input type="text" placeholder="MM">
      <input type="text" placeholder="YY">
    </div>
    </div>
    <div class="form-control">
      <label for="">CVC</label>
      <input type="text" placeholder="e.g. 123">
    </div>
  </div>
  <button>Confirm</button>
  </form>
  
</div>



<!-- 

  Jane Appleseed
  00/00

  000

  Cardholder Name
  e.g. Jane Appleseed

  Card Number
  e.g. 1234 5678 9123 0000

  Exp. Date (MM/YY)
  MM
  YY

  CVC
  e.g. 123

  Confirm

  
</body>
</html>
