<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desserts Menu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f8f8f8;
    }
    @media (max-width: 768px) {
  .main-container {
    flex-direction: column;
    align-items: center;
  }
}
    .main-container {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      padding: 20px;
    }
  
    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
  
    .dessert-card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      width: 200px;
      text-align: center;
      padding: 15px;
    }
  
    .dessert-card img {
      width: 100%;
      border-radius: 8px;
    }
  
    .dessert-card h3 {
      font-size: 1.1em;
      margin: 10px 0;
    }
  
    .dessert-card p {
      color: #555;
      font-size: 0.9em;
    }
  
    .dessert-card button {
      margin-top: 10px;
      background-color: #d2691e;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }
  
    .dessert-card button:hover {
      background-color: #b8581b;
    }
  
    .cart {
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      width: 400px;
      padding: 20px;
    }
  
    .cart h2 {
      margin-bottom: 20px;
    }
  
    .cart ul {
      list-style: none;
      padding: 0;
    }
  
    .cart ul li {
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
    }
  
    .cart .total {
      font-weight: bold;
      margin-top: 20px;
    }
  
    .cart button {
      margin-top: 20px;
      background-color: #d2691e;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }
  
    .cart button:hover {
      background-color: #b8581b;
    }
   
  </style>
  
  <body>

    <div class="main-container">

      <div class="container">
        
        <div class="dessert-card">
          <img src="/assets/images/image-waffle-desktop.jpg" alt="Waffle with Berries">
          <h3>Waffle with Berries</h3>
          <p>$6.50</p>
          <button>Add to Cart</button>
        </div>
        <div class="dessert-card">
          <img src="/assets/images/image-creme-brulee-desktop.jpg" alt="Crème Brûlée">
          <h3>Vanilla Bean Crème Brûlée</h3>
          <p>$7.00</p>
          <button>Add to Cart</button>
        </div>
        <div class="dessert-card">
          <img src="/assets/images/image-macaron-desktop.jpg" alt="Macaron Mix of Five">
                  <h3>Macaron Mix of Five</h3>
                  <p>$8.00</p>
                  <button>Add to Cart</button>
        </div>
        <div class="dessert-card">
          <img src="/assets/images/image-tiramisu-desktop.jpg" alt="Classic Tiramisu">
          <h3>Classic Tiramisu</h3>
          <p>$7.50</p>
          <button>Add to Cart</button>
        </div>
        <div class="dessert-card">
          <img src="/assets/images/image-baklava-desktop.jpg" alt="Pistachio Baklava">
          <h3>Pistachio Baklava</h3>
          <p>$6.00</p>
          <button>Add to Cart</button>
        </div>
        <div class="dessert-card">
          <img src="/assets/images/image-meringue-desktop.jpg" alt="Lemon Meringue Pie">
          <h3>Lemon Meringue Pie</h3>
          <p>5.50$</p>
          <button>Add to Cart</button>
        </div>
        <div class="dessert-card">
          <img src="/assets/images/image-cake-desktop.jpg" alt="Red Velvet Cake">
                <h3>Red Velvet Cake</h3>
                <p>4.50$</p>
                <button>Add to Cart</button>
        </div>
        <div class="dessert-card">
          <img src="/assets/images/image-brownie-desktop.jpg" alt="Salted Caramel Brownie">
          <h3>Salted Caramel Brownie</h3>
          <p>5.50$</p>
          <button>Add to Cart</button>
        </div>
        <div class="dessert-card">
          <img src="/assets/images/image-panna-cotta-desktop.jpg" alt="Vanilla Panna Cotta">
            <h3>Vanilla Panna Cotta</h3>
            <p>6.50$</p>
            <button>Add to Cart</button>
        </div>
        
        
        
        
        
        
  
      </div>
      <div class="cart">
        <h2>Your Cart</h2>
        <ul>
          <!-- Cart items will be added dynamically -->
        </ul>
        <p class="total">Order Total: $0.00</p>
        <button>Confirm Order</button>
      </div>
    </div>
  </body>
  

  <script>

  let cart = [];
  

  function updateCart() {
    const cartElement = document.querySelector('.cart ul');
    const totalElement = document.querySelector('.cart .total');

    cartElement.innerHTML = '';
  
    let total = 0;
  
    
    cart.forEach((item, index) => {
      const li = document.createElement('li');
      li.innerHTML = `
        <span>${item.name}</span>
        <span>$${item.price.toFixed(2)}</span>
        <button onclick="removeFromCart(${index})">Remove</button>
      `;
      cartElement.appendChild(li);
      total += item.price;
    });
  
   
    totalElement.textContent = `Order Total: $${total.toFixed(2)}`;
  }
  

  function addToCart(name, price) {
    cart.push({ name, price });
    updateCart();
  }

  function removeFromCart(index) {
    cart.splice(index, 1);
    updateCart();
  }
  

  document.querySelectorAll('.dessert-card button').forEach((button, index) => {
    button.addEventListener('click', () => {
      const card = button.parentElement;
      const name = card.querySelector('h3').textContent;
      const price = parseFloat(card.querySelector('p').textContent.slice(1));
      addToCart(name, price);
    });
  });
  
  </script>
</body>
</html>
