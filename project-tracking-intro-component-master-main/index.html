<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Project tracking intro component</title>


  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Karla:ital,wght@0,200..800;1,200..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Rubik:ital,wght@0,300..900;1,300..900&family=Space+Grotesk:wght@300..700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Karla:ital,wght@0,200..800;1,200..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Rubik:ital,wght@0,300..900;1,300..900&family=Space+Grotesk:wght@300..700&display=swap');
   *{
    margin: 0;
    padding: 0;
   }
   body{
    font-family: "Barlow", sans-serif;

   }
   header{
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 2rem 4rem;
    z-index: 100;
   }
   nav{
display: flex;
justify-content:center ;
align-items: center;
gap: 2rem;
font-family: "Barlow Condensed", sans-serif;



   }
   nav a{
    text-decoration: none;
    text-transform: uppercase;
    font-weight: 700;
color: black;
   }
   main{
    display: flex;
height: 100vh;

   }
   main>div{
flex: 1;
   }
   .content{
    display: flex;
    flex-direction: column;
    gap: 1rem;
    justify-content: center;
    padding: 3rem;
   }
   .illustration{
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    
   }
   .background{
    background-color: hsl(207, 33%, 95%) ;
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 460px;
    z-index: -1;
    border-bottom-left-radius: 40px;
   }
   .illustration img{
    position: absolute;
    right: -280px;
   }
   span{
    color: white;
    background-color: hsl(230, 29%, 20%);
width: 50px;
height: 25px;
text-align: center;
border-radius: 60px;
   }
   h1{
    font-size: 4rem;
    font-weight: 800;
    line-height: 70px;
    text-transform: uppercase;
    color:hsl(230, 29%, 20%) ;
   }
   .header-content{
    display: flex;
    gap: 1rem;
    align-items: center;
   }
   .header-content h4{
    color: hsl(231, 7%, 65%);
    font-weight: 300;
    letter-spacing: 5px;
   }
   p{
    font-size: 24px;
color: hsl(231, 7%, 65%) ;
padding: 30px 250px 30px 0;
   }
   button{
    padding: 20px 36px;
    background-color: hsl(0, 100%, 68%);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    font-size: 15px;
    text-transform: uppercase;
   }
   .card{
    display: flex;
    gap: 2rem;
    align-items: center;
   }
   .card  a{
    color: hsl(231, 7%, 65%);

    text-decoration: none;
    font-size: 19px;
    letter-spacing: 4px;
   }
  </style>
</head>
<body>
<header>
  <img src="/images/logo.svg" alt="">
  <nav>
<a href="">Product</a>
<a href="">Features</a>
<a href="">Pricing</a>
<a href="">Login</a>
  </nav>


</header>
<main>
  <div class="content">
    <div class="header-content">
    <span class="new"> New</span> <h4> Monograph Dashboard</h4></div>
    <h1> Powerful insights into your team</h1>
    <p> Project planning and time tracking for agile teams
    </p>
  
    <div class="card">
      <button> Schedule a demo</button>
      <a href="">  To see a live preview</a>
    </div>
  </div>
  
  <div class="illustration">
    <div class="background"></div>
  <img src="/images/illustration-devices.svg" alt="">
  </div>
  
    </main>
















 
 
  
  

 
 

 
 
 

  
  <footer>
  </footer>
</body>
</html>
