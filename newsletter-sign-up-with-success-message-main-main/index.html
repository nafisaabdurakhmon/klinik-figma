<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>
      Frontend Mentor | Newsletter sign-up form with success message
    </title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@100..900&family=Figtree:wght@757&family=Inter:wght@100..900&family=Josefin+Sans:wght@500&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Lexend+Deca:wght@100..900&family=Libre+Franklin:ital,wght@0,100;1,100&family=Manrope:wght@800&family=Merienda:wght@308&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap');
      * {
        margin: 0;
        padding: 0;
      }
      body{
        font-family: "Roboto", sans-serif;
       color: hsl(234, 29%, 20%);
      }
      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: hsl(234, 29%, 20%);
      }
      .cards {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: row;
        background-color: hsl(0, 0%, 100%);
        padding: 25px 35px;
        border-radius:20px ;
        gap: 30px;
        
   
      }
      .card-content{
       display: flex;
       flex-direction: column;
       width: 400px;
       padding:40px ;
       gap: 40px;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      button{
        background-color: hsl(235, 18%, 26%);
        border-radius: 10px;
        border: 1px solid hsla(235, 18%, 26%, 0) ;
        color:hsl(0, 0%, 100%) ;
        width:350px ;
        height: 50px;
      }
      button:hover {
        background-color:hsl(4, 100%, 67%) ;
      }
      input{
   
        border-radius: 10px;
        border: 1px solid  hsla(231, 7%, 60%, 0.606);
        width: 350px;
        height: 50px;
        
      }
      ul {
        list-style-type: none;
        display: flex;
        flex-direction: column;
        gap: 20px;
       
      }
      li{
        display:flex;
       
        gap: 20px;
      }
      h1{
        color: hsl(234, 29%, 20%) ;
        font-size: 55px;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="cards">
        <div class="card-content">
          <h1>Stay updated!</h1>
          <p>Join 60,000+ product managers receiving monthly updates on:</p>
          <ul>
            <li>
              <img src="/assets/images/icon-list.svg" alt="" />Product discovery
              and building what matters
            </li>
            <li>
              <img src="/assets/images/icon-list.svg" alt="" />Measuring to
              ensure updates are a success
            </li>
            <li>
              <img src="/assets/images/icon-list.svg" alt="" />And much more!
            </li>
          </ul>
          <form action="">
            <div class="email">
            <h6>Email address</h6>
            <input type="text" placeholder="email@company.com" />
          </div>
            <button>Subscribe to monthly newsletter</button>
          </form>
        </div>
        <img src="/assets/images/illustration-sign-up-desktop.svg" alt="" />
      </div>
    </div>
  </body>
</html>
