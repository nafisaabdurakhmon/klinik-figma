<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Advice generator app</title>


  <style>
    @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Manrope:wght@200..800&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap');
    *{
      margin: 0;
      padding: 0;
    }
    .container{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: hsl(218, 23%, 16%);
      gap: 2rem;
    }
    .card{
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 40px;
      width: 400px;
      height: 250px;
      gap: 2rem;
      background-color: hsl(217, 19%, 24%);
      border-radius: 1rem;
      text-align: center;
      position: relative;
    }
    h4{
      letter-spacing: 5px;
      font-size: 19px;
      font-weight: 500;
      color:  hsl(150, 100%, 66%);
      text-transform: uppercase;

    }
    h1{
      color: hsl(193, 38%, 86%);
      font-size: 25px;
      padding: 20px;
 font-weight: 700;
 cursor: pointer;
 font-family: "Manrope", sans-serif;
    }
    button{
      background-color: hsl(150, 100%, 66%);
      border-radius: 100px;
      width: 58px;
      height: 55px;
      padding: 13px;
      border: none;
      display: flex;
      justify-content: center;
      align-items: center;
      position: absolute;
      bottom: -36px;
      box-shadow: 14px 1px 12px -8px hsl(150, 100%, 66%);
    }
    buttton:hover{
      background-color: hsl(150, 100%, 66%);

   
    }
  </style>
</head>
<body>

 <div class="container">
  <div class="card">
    <h4 id="h4"> ADVICE     #117</h4>
  <h1 id="h1">"It is easy to sit up and take notice, what's difficult is getting up and taking action"</h1>
  <img src="/images/pattern-divider-desktop.svg" alt="">
  <button onclick="advice ()" class="imgBtn"><img src="/images/icon-dice.svg" width="80%" alt=""></button>
  </div>
 </div>
  
 <script>
  const api = 'https://api.adviceslip.com/advice'
const h1 = document.querySelector('#h1');
const h4 = document.querySelector('#h4');

function advice (){
  fetch (api)
  .then (respons => respons.json())
  .then (data => {
    console.log(data)
    h1.innerHTML = `"${data.slip.advice }"`
    h4.innerHTML =`advice # ${data.slip.id } `
  })
}
 </script>
  
</body>
</html>
