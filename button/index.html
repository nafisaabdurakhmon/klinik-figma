<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        button {
            width: 266px;
            height: 80px;
            border-radius: 20px;
            background-color: #bce068;
            border: none;
            cursor: pointer;
            color: black;
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button:active {
            transform: scale(1.95);
        }
        button:hover {
            background-color: darkslategray;
            color: white;
        }
        input[type='checkbox'] {
            width: 60px;
            height: 60px;
        }
    </style>
    <body>
        <button>Link send</button>

        <input type="checkbox" />
    </body>
</html>
