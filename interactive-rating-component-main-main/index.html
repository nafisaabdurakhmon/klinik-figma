<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Interactive rating component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body{
        display: flex;
        justify-content: center;
        background-color:hsl(216, 12%, 8%) ;
        color: hsl(0, 0%, 100%) ;
      
      }
      .container {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        
      }
      .cards {
        display: flex;
        justify-content: center;
        flex-direction: column;
        width: 300px;
        height: 300px;
        background-color:hsl(213, 19%, 18% );
        border-radius: 10px;
        padding: 30px;
        gap: 20px;
        
        
      }
      .logo {
        border-radius: 100px;
        width: 32px;
        height: 32px;
        background-color:hsl(216, 18%, 22%) ;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      h1 {
        
      }
      p {
        color:hsl(216, 12%, 54%) ;
      }
      button.circle {
        color: hsl(214, 3%, 48%);
        border-radius: 100px;
        width: 40px;
        height: 40px;
      background-color: #49454517;;
        border: none;
      }
      button.circle:hover {
        border-radius: 100px;
        background-color: hsl(25, 97%, 53%);
        color: rgb(188, 180, 180);
      }

      button.submit {
        border-radius: 20px;
        height:40px ;
        width:100% ;
        border: none;
        background-color: hsl(25, 97%, 53%);
        
       


      }
      button.submit:hover{
        background-color: hsl(30, 10%, 84%);
      }
      .content{
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
      }
    </style>
  </head>
  <body>
    <div class="container">
     
      <div class="cards">
        <div class="logo"><img src="/images/icon-star.svg" alt="" /></div>
        <h1>How did we do?</h1>
        <p>
          Please let us know how we did with your support request. All feedback
          is appreciated to help us improve our offering!
        </p>
        <div class="content">
        <button class="circle">1</button>
        <button class="circle">2</button>
        <button class="circle">3</button>
        <button class="circle">4</button>
        <button class="circle">5</button>
      </div>
        <button class="submit">Submit</button>
      
      </div>
    </div>
  </body>
</html>
