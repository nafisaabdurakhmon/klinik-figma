<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Stats preview card component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Lexend+Deca:wght@100..900&family=Merienda:wght@900&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap');

      * {
        margin: 0;
        padding: 0;
      }
      .card {
        display: flex;
        padding: 10px;
        margin: 30px;
        background-color: hsl(244, 38%, 16%);
        width: 65%;
      }
      .content {
        display: flex;
        gap: 20px;
      }
      h1 {
        color: hsla(0, 0%, 100%, 0.75);
        
      }

      body {
        background-color: hsl(233, 47%, 7%);
        font-family: "Inter", sans-serif;
      }
      .card-img {
        position: relative;
      }
      .card-img::after{
        
        position: absolute;
        background-color: rgba(137, 43, 226, 0.399);
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }

      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

  

      .card-body {
        display: flex;
        flex-direction: column;
        gap: 20px;
        justify-content: center;
        padding: 50px 100px;
        
      }
      .stat {
        display: flex;
        flex-direction: column;
        justify-content: center;
        color: hsl(0, 0%, 100%);
      }
      p{
       color:  hsla(0, 0%, 100%, 0.6);
      }
      h4{
        color:  hsla(0, 0%, 100%, 0.6);
        font-family: "Lexend Deca", sans-serif;
        text-transform: uppercase;
        font-weight: 400;
      }
      @media (max-width:375px){

.content{
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 35px;

}
.container{
  height: auto;
}
.card{
width: auto;
padding: 0;
  flex-direction: column-reverse;
}
.card-body{


}



      }
    </style>
  </head>
  <body>
    <div class="container">
    <div class="card">
      <div class="card-body">
        <h1>Get  <span style="color:hsl(277, 64%, 61%) ;"> insights </span> that help your business grow.</h1>
        <p>
          <b>Discover the benefits of data analytics and make better decisions
          regarding revenue, customer experience, and overall efficiency.</b>
        </p>
        <div class="content">
          <div class="stat">
            <h2>10k+</h2>
            <h4>companies</h4>
          </div>
          <div class="stat">
            <h2>314</h2>
            <h4>templates</h4>
          </div>
          <div class="stat">
            <h2>12m+</h2>
            <h4>queries</h4>
          </div>
        </div>
      </div>
      <div class="card-img">
        <img  src="/images/image-header-desktop.jpg" alt="" />
      </div>
     
    </div>

  </div>

  </body>
</html>
